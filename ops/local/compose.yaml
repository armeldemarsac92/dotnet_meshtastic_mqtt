services:
  meshboard-client:
    build:
      context: ../..
      dockerfile: src/MeshBoard.Client/Dockerfile
    container_name: meshboard-client
    depends_on:
      meshboard-api:
        condition: service_started
      vernemq:
        condition: service_healthy
    ports:
      - "8082:80"
    restart: unless-stopped

  postgres:
    image: postgres:17-bookworm
    container_name: meshboard-postgres
    environment:
      POSTGRES_DB: meshboard
      POSTGRES_USER: meshboard
      POSTGRES_PASSWORD: meshboard
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshboard -d meshboard"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - meshboard-postgres-data:/var/lib/postgresql/data

  meshboard-api:
    build:
      context: ../..
      dockerfile: src/MeshBoard.Api/Dockerfile
    container_name: meshboard-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Persistence__Provider: PostgreSQL
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=meshboard;Username=meshboard;Password=meshboard
      RealtimeSession__BrokerUrl: ${MESHBOARD_PUBLIC_BROKER_URL:-ws://localhost:8082/mqtt}
      RealtimeSession__UseRequestOriginBrokerUrl: ${MESHBOARD_USE_REQUEST_ORIGIN_BROKER_URL:-true}
      RealtimeSession__BrokerPath: ${MESHBOARD_BROKER_PATH:-/mqtt}
      RealtimeSession__AllowInsecureBrokerUrl: ${MESHBOARD_ALLOW_INSECURE_BROKER_URL:-true}
      RealtimeSession__Issuer: meshboard-api-local-compose
      RealtimeSession__Audience: meshboard-realtime
      RealtimeSession__KeyId: meshboard-compose-k1
      RealtimeSession__ClientIdPrefix: mb
      RealtimeSession__TokenLifetimeMinutes: "5"
      RealtimeSession__SigningPrivateKeyPemFile: /run/meshboard-secrets/realtime-signing-private-key.pem
      RealtimeDownstreamBroker__ClientId: meshboard-realtime-bridge
      RealtimeDownstreamBroker__Username: meshboard-bridge
      RealtimeDownstreamBroker__Password: meshboard-bridge-local-secret
    ports:
      - "8081:8080"
    restart: unless-stopped
    volumes:
      - ./secrets:/run/meshboard-secrets:ro
      - meshboard-api-dataprotection:/root/.aspnet/DataProtection-Keys

  vernemq:
    build:
      context: ../..
      dockerfile: ops/vernemq/Dockerfile
      args:
        VERNEMQ_VERSION: "2.1.1"
    container_name: meshboard-vernemq
    environment:
      HOME: /vernemq/data
      WAIT_FOR_ERLANG: "60"
    depends_on:
      meshboard-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "/vernemq/bin/vernemq ping | grep -q pong"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    ports:
      - "1883:1883"
      - "8080:8080"
      - "8084:8084"
    restart: unless-stopped
    volumes:
      - ../vernemq/vernemq.conf:/vernemq/etc/vernemq.conf:ro
      - ../vernemq/vm.args:/vernemq/etc/vm.args:ro
      - ../vernemq/certs:/vernemq/etc/certs:ro
      - meshboard-vernemq-data:/vernemq/data
      - meshboard-vernemq-log:/vernemq/log

  meshboard-realtime-bridge:
    build:
      context: ../..
      dockerfile: src/MeshBoard.RealtimeBridge/Dockerfile
    container_name: meshboard-realtime-bridge
    depends_on:
      vernemq:
        condition: service_healthy
    environment:
      MeshtasticRuntime__EnableHostedService: "true"
      Persistence__Provider: PostgreSQL
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=meshboard;Username=meshboard;Password=meshboard
      RealtimeDownstreamBroker__Host: vernemq
      RealtimeDownstreamBroker__Port: "1883"
      RealtimeDownstreamBroker__UseTls: "false"
      RealtimeDownstreamBroker__ClientId: meshboard-realtime-bridge
      RealtimeDownstreamBroker__Username: meshboard-bridge
      RealtimeDownstreamBroker__Password: meshboard-bridge-local-secret
    restart: unless-stopped

  meshboard-collector:
    build:
      context: ../..
      dockerfile: src/MeshBoard.Collector/Dockerfile
    container_name: meshboard-collector
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MeshtasticRuntime__EnableHostedService: "true"
      Persistence__Provider: PostgreSQL
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=meshboard;Username=meshboard;Password=meshboard
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: meshboard-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MeshBoardLocalKafkaCluster01
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    volumes:
      - meshboard-kafka-data:/var/lib/kafka/data

  neo4j:
    image: neo4j:5
    container_name: meshboard-neo4j
    environment:
      NEO4J_AUTH: neo4j/meshboard
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    volumes:
      - meshboard-neo4j-data:/data
      - meshboard-neo4j-logs:/logs

  meshboard-collector-ingress:
    build:
      context: ../..
      dockerfile: src/MeshBoard.Collector.Ingress/Dockerfile
    container_name: meshboard-collector-ingress
    profiles:
      - collector-v2
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      MeshtasticRuntime__EnableHostedService: "true"
      MeshtasticRuntime__InboundQueueCapacity: "16384"
      MeshtasticRuntime__InboundWorkerCount: "8"
      Broker__Host: ${MESHBOARD_MQTT_HOST:-mqtt.meshtastic.org}
      Broker__Port: ${MESHBOARD_MQTT_PORT:-1883}
      Broker__UseTls: "false"
      Broker__ClientId: meshboard-collector-ingress
      Broker__Username: ${MESHBOARD_MQTT_USERNAME:-meshdev}
      Broker__Password: ${MESHBOARD_MQTT_PASSWORD:-large4cats}
      Broker__DefaultTopicPattern: ${MESHBOARD_MQTT_TOPIC_PATTERN:-msh/US/2/e/#}
      Broker__DownlinkTopic: msh/US/2/json/mqtt/
      Broker__EnableSend: "false"
      Kafka__BootstrapServers: kafka:9092
    restart: unless-stopped

  meshboard-collector-normalizer:
    build:
      context: ../..
      dockerfile: src/MeshBoard.Collector.Normalizer/Dockerfile
    container_name: meshboard-collector-normalizer
    profiles:
      - collector-v2
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      MeshtasticRuntime__EnableHostedService: "false"
      Kafka__BootstrapServers: kafka:9092
    restart: unless-stopped

  meshboard-collector-stats-projector:
    build:
      context: ../..
      dockerfile: src/MeshBoard.Collector.StatsProjector/Dockerfile
    container_name: meshboard-collector-stats-projector
    profiles:
      - collector-v2
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      Kafka__BootstrapServers: kafka:9092
      Persistence__Provider: PostgreSQL
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=meshboard;Username=meshboard;Password=meshboard
    restart: unless-stopped

  meshboard-collector-graph-projector:
    build:
      context: ../..
      dockerfile: src/MeshBoard.Collector.GraphProjector/Dockerfile
    container_name: meshboard-collector-graph-projector
    profiles:
      - collector-v2
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      Kafka__BootstrapServers: kafka:9092
      Neo4j__Uri: bolt://neo4j:7687
      Neo4j__Username: neo4j
      Neo4j__Password: meshboard
    restart: unless-stopped

  meshboard-collector-topology-analyst:
    build:
      context: ../..
      dockerfile: src/MeshBoard.Collector.TopologyAnalyst/Dockerfile
    container_name: meshboard-collector-topology-analyst
    profiles:
      - collector-v2
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      Neo4j__Uri: bolt://neo4j:7687
      Neo4j__Username: neo4j
      Neo4j__Password: meshboard
      TopologyAnalysis__ScheduleIntervalSeconds: "300"
      TopologyAnalysis__GraphProjectionName: topologyProjection
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: meshboard-cloudflared
    profiles:
      - tunnel
    depends_on:
      meshboard-client:
        condition: service_started
    command:
      - tunnel
      - --protocol
      - ${CF_TUNNEL_TRANSPORT_PROTOCOL:-auto}
      - --no-autoupdate
      - run
      - --token
      - ${CF_TUNNEL_TOKEN:-}
    restart: unless-stopped

volumes:
  meshboard-api-dataprotection:
  meshboard-kafka-data:
  meshboard-neo4j-data:
  meshboard-neo4j-logs:
  meshboard-postgres-data:
  meshboard-vernemq-data:
  meshboard-vernemq-log:
