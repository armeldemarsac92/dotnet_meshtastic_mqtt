allow_anonymous = off

plugins.vmq_webhooks = on

listener.http.default.max_header_value_length = 32000
listener.http.default.max_request_line_length = 32000

listener.tcp.default = 0.0.0.0:1883
listener.ws.default = 0.0.0.0:8080

# Browser clients must connect to the /mqtt path.
listener.wss.default = 0.0.0.0:8084
listener.wss.default.cafile = /etc/vernemq/certs/ca.pem
listener.wss.default.certfile = /etc/vernemq/certs/tls.crt
listener.wss.default.keyfile = /etc/vernemq/certs/tls.key

listener.vmq.clustering = 0.0.0.0:44053

vmq_webhooks.auth_on_register_m5 = http://meshboard-api:8080/internal/realtime/vernemq/auth-on-register-m5
vmq_webhooks.auth_on_subscribe_m5 = http://meshboard-api:8080/internal/realtime/vernemq/auth-on-subscribe-m5
vmq_webhooks.auth_on_publish_m5 = http://meshboard-api:8080/internal/realtime/vernemq/auth-on-publish-m5
