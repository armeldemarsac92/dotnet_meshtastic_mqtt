syntax = "proto3";

package meshtastic;

option csharp_namespace = "MeshBoard.Infrastructure.Meshtastic.Protobuf";

// Minimal Meshtastic schema subset for the current read-only monitoring slice.
// Verified against the official Meshtastic protobuf definitions on 2026-03-04:
// https://github.com/meshtastic/protobufs/blob/master/meshtastic/mqtt.proto
// https://github.com/meshtastic/protobufs/blob/master/meshtastic/mesh.proto
enum PortNum {
  UNKNOWN_APP = 0;
  TEXT_MESSAGE_APP = 1;
  POSITION_APP = 3;
  NODEINFO_APP = 4;
  ROUTING_APP = 5;
  TEXT_MESSAGE_COMPRESSED_APP = 7;
  WAYPOINT_APP = 8;
  TELEMETRY_APP = 67;
  TRACEROUTE_APP = 70;
  NEIGHBORINFO_APP = 71;
  MAP_REPORT_APP = 73;
}

message ServiceEnvelope {
  MeshPacket packet = 1;
  string channel_id = 2;
  string gateway_id = 3;
}

message MeshPacket {
  fixed32 from = 1;
  fixed32 to = 2;
  uint32 channel = 3;

  oneof payload_variant {
    Data decoded = 4;
    bytes encrypted = 5;
  }

  fixed32 id = 6;
  fixed32 rx_time = 7;
  float rx_snr = 8;
  uint32 hop_limit = 9;
  bool want_ack = 10;
  int32 rx_rssi = 12;
  bool via_mqtt = 14;
  uint32 hop_start = 15;
}

message Data {
  PortNum portnum = 1;
  bytes payload = 2;
  bool want_response = 3;
  fixed32 dest = 4;
  fixed32 source = 5;
  fixed32 request_id = 6;
  fixed32 reply_id = 7;
}

message Position {
  sfixed32 latitude_i = 1;
  sfixed32 longitude_i = 2;
  int32 altitude = 3;
  fixed32 time = 4;
  uint32 location_source = 5;
  uint32 altitude_source = 6;
  uint32 timestamp = 7;
  uint32 timestamp_millis_adjust = 8;
  uint32 altitude_hae = 9;
  uint32 sats_in_view = 10;
  float ground_speed = 11;
  float ground_track = 12;
  fixed32 precision_bits = 13;
  uint32 fix_quality = 14;
  uint32 fix_type = 15;
  int32 pdop = 16;
  int32 hdop = 17;
  int32 vdop = 18;
  uint32 gps_accuracy = 19;
  uint32 heart_bpm = 21;
  uint32 sp_o2 = 22;
  uint32 sensor_id = 23;
}

message Telemetry {
  uint32 time = 1;

  oneof variant {
    DeviceMetrics device_metrics = 2;
    LocalStats local_stats = 4;
    PowerMetrics power_metrics = 5;
    EnvironmentMetrics environment_metrics = 8;
  }
}

message DeviceMetrics {
  uint32 battery_level = 1;
  float voltage = 2;
  float channel_utilization = 3;
  float air_util_tx = 4;
  uint32 uptime_seconds = 12;
}

message LocalStats {}

message PowerMetrics {}

message EnvironmentMetrics {
  float temperature = 1;
  float relative_humidity = 2;
  float barometric_pressure = 5;
}

message User {
  string id = 1;
  string long_name = 2;
  string short_name = 3;
  uint32 hw_model = 4;
  bool is_licensed = 5;
  uint32 role = 6;
  bytes public_key = 7;
}

message Neighbor {
  uint32 node_id = 1;
  float snr = 2;
  fixed32 last_rx_time = 3;
}

message NeighborInfo {
  uint32 node_id = 1;
  uint32 last_sent_by_id = 2;
  uint32 node_broadcast_interval_secs = 3;
  repeated Neighbor neighbors = 4;
}

message RouteDiscovery {
  repeated fixed32 route = 1;
  repeated int32 snr_towards = 2;
  repeated fixed32 route_back = 3;
  repeated int32 snr_back = 4;
}

message Routing {
  enum Error {
    NONE = 0;
    NO_ROUTE = 1;
    GOT_NAK = 2;
    TIMEOUT = 3;
    NO_INTERFACE = 4;
    MAX_RETRANSMIT = 5;
    NO_CHANNEL = 6;
    TOO_LARGE = 7;
    NO_RESPONSE = 8;
    DUTY_CYCLE_LIMIT = 9;
    BAD_REQUEST = 32;
    NOT_AUTHORIZED = 33;
    PKI_FAILED = 34;
    PKI_UNKNOWN_PUBKEY = 35;
    ADMIN_BAD_SESSION_KEY = 36;
    ADMIN_PUBLIC_KEY_UNAUTHORIZED = 37;
    RATE_LIMIT_EXCEEDED = 38;
    PKI_SEND_FAIL_PUBLIC_KEY = 39;
  }

  oneof variant {
    RouteDiscovery route_request = 1;
    RouteDiscovery route_reply = 2;
    Error error_reason = 3;
  }
}
